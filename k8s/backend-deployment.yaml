apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-builder-backend
  namespace: workflow-builder
  labels:
    app: workflow-builder-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workflow-builder-backend
  template:
    metadata:
      labels:
        app: workflow-builder-backend
    spec:
      containers:
      - name: backend
        # Build: docker build -t your-registry.io/workflow-builder-backend:latest -f backend/Dockerfile .
        image: your-registry.io/workflow-builder-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: workflow-builder-secrets
              key: POSTGRES_PASSWORD
        - name: SPRING_JPA_DATABASE_PLATFORM
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: SPRING_JPA_DATABASE_PLATFORM
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        - name: LOGGING_LEVEL_ROOT
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: LOGGING_LEVEL_ROOT
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: CORS_ALLOWED_ORIGINS
        - name: EXECUTION_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: EXECUTION_TIMEOUT_SECONDS
        - name: EXECUTION_MAX_CONCURRENT
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: EXECUTION_MAX_CONCURRENT
        - name: WEBSOCKET_PING_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: WEBSOCKET_PING_INTERVAL_SECONDS
        - name: WEBSOCKET_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: workflow-builder-config
              key: WEBSOCKET_TIMEOUT_SECONDS
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: workflow-builder-secrets
              key: JWT_SECRET
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: workflow-builder-secrets
              key: OPENAI_API_KEY
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: workflow-builder-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: workflow-builder-secrets
              key: GEMINI_API_KEY
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # Logs: SLF4J/Logback → stdout/stderr only (see logback-spring.xml). Collect via
        # kubectl logs / Datadog Agent / cluster log pipeline — no file volume needed.
