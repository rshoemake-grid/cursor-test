apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-builder-config
  namespace: workflow-builder
data:
  # Spring Boot (backend-java) — see backend-java/src/main/resources/application*.properties
  # Add ",json" for one JSON log line per event (Datadog / Loki / Cloud Logging): production,json
  SPRING_PROFILES_ACTIVE: "production"

  # PostgreSQL (add org.postgresql driver is on the classpath; override SQLite defaults)
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql:5432/workflows"
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"

  # Logging
  LOGGING_LEVEL_ROOT: "INFO"

  # CORS: comma-separated origins (matches cors.allowed-origins)
  CORS_ALLOWED_ORIGINS: "https://yourdomain.com"

  # Execution / WebSocket (matches execution.* and websocket.*)
  EXECUTION_TIMEOUT_SECONDS: "300"
  EXECUTION_MAX_CONCURRENT: "10"
  WEBSOCKET_PING_INTERVAL_SECONDS: "20"
  WEBSOCKET_TIMEOUT_SECONDS: "60"
