plugins {
    id 'java'
    id 'org.springframework.boot' version '3.2.9'  // CVE-2024-38807 fix
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'com.github.ben-manes.versions' version '0.53.0'
}

group = 'com.workflow'
version = '1.0.0'

// Use JDK 17 toolchain - ensures consistent build regardless of system JAVA_HOME
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
    mockitoAgent {
        transitive = false
    }
}

// Exclude javax JAXB jackson module - uses javax.xml.bind removed in Java 11+
// Hibernate 6 / Spring Boot 3 use Jakarta; entities use Jackson/JPA annotations, not JAXB
configurations.all {
    exclude group: 'com.fasterxml.jackson.module', module: 'jackson-module-jaxb-annotations'
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot Starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    // Database
    implementation 'org.xerial:sqlite-jdbc:3.51.2.0'
    implementation 'org.hibernate.orm:hibernate-community-dialects'
    runtimeOnly 'org.postgresql:postgresql'

    // JWT - S-H5: Upgraded from 0.12.3 to 0.13.0 (CVE-2024-31033)
    implementation 'io.jsonwebtoken:jjwt-api:0.13.0'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.13.0'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.13.0'

    // Password Hashing
    implementation 'org.mindrot:jbcrypt:0.4'

    // JSON Processing - 2.16.1 fixes CVE-2023-35116 (2.17+ caused NoSuchMethodError in tests)
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.1'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.16.1'

    // Lombok (1.18.38+ required for Java 24 compatibility - TypeTag.UNKNOWN removed)
    compileOnly 'org.projectlombok:lombok:1.18.38'
    annotationProcessor 'org.projectlombok:lombok:1.18.38'

    // OpenAPI/Swagger
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.3.0'

    // Load repo-root .env into the Spring Environment (DEV_BOOTSTRAP_*, etc.) — same UX as Python/uvicorn
    implementation 'io.github.cdimascio:dotenv-java:3.0.0'

    // Google ADK (Agent Development Kit) - for building AI agents
    implementation 'com.google.adk:google-adk:0.7.0'

    // GCP + AWS (storage explorer + workflow storage nodes) — versions from BOMs
    implementation platform('com.google.cloud:libraries-bom:26.50.0')
    implementation 'com.google.cloud:google-cloud-storage'
    implementation 'com.google.cloud:google-cloud-pubsub'
    implementation 'com.google.auth:google-auth-library-oauth2-http'

    implementation platform('software.amazon.awssdk:bom:2.25.56')
    implementation 'software.amazon.awssdk:s3'
    implementation 'software.amazon.awssdk:ec2'
    implementation 'software.amazon.awssdk:auth'
    implementation 'software.amazon.awssdk:regions'

    // JAXB: jackson-module-jaxb-annotations (javax) excluded above - Hibernate 6 uses Jakarta (jakarta.xml.bind)
    // from hibernate-core; no extra deps needed for Java 17+

    // Logging (SLF4J with Logback - included in Spring Boot Starter)
    // No additional dependency needed

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'com.h2database:h2:2.4.240'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
    
    // Use latest Mockito version for Java 23+ compatibility
    testImplementation('org.mockito:mockito-core:5.22.0')
    testImplementation('org.mockito:mockito-junit-jupiter:5.22.0')
    mockitoAgent('org.mockito:mockito-core:5.22.0')
}

tasks.named('test') {
    useJUnitPlatform()
    ignoreFailures = false
    // T-1: Provide LLM API key for ExecutionController integration tests (execute workflow).
    // TEST-ONLY: Never used in production. Production uses user-configured API keys from settings.
    environment "GEMINI_API_KEY", "test-key-for-integration-tests"

    // Configure Mockito as Java agent for Java 17+ compatibility
    // This enables Mockito's inline mock maker to mock final classes and methods
    def mockitoAgent = configurations.mockitoAgent
    jvmArgs = [
        "-javaagent:${mockitoAgent.asPath}",
        "-Xshare:off",  // Suppress class-sharing warnings
        '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
        '--add-opens', 'java.base/java.util=ALL-UNNAMED',
        '--add-opens', 'java.base/java.lang.reflect=ALL-UNNAMED',
        '--add-opens', 'java.base/java.text=ALL-UNNAMED',
        '--add-opens', 'java.desktop/java.awt.font=ALL-UNNAMED'
    ]
    
    // Ensure Mockito uses inline mock maker
    systemProperty 'mockito.mock-maker', 'mock-maker-inline'
}

tasks.named('bootJar') {
    archiveBaseName = 'workflow-builder-backend'
    archiveVersion = '1.0.0'
}

// JaCoCo configuration for test coverage
jacoco {
    toolVersion = "0.8.11"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
    classDirectories.setFrom(files(classDirectories.files.collect {
        fileTree(dir: it, exclude: [
            '**/dto/**',
            '**/entity/**',
            '**/config/**',
            '**/WorkflowBuilderApplication.class',
            // Cloud SDK I/O — covered by integration/manual tests; skews instruction ratio
            '**/CloudStorageExplorerService.class'
        ])
    }))
    finalizedBy jacocoTestCoverageVerification
}

jacocoTestCoverageVerification {
    dependsOn jacocoTestReport
    violationRules {
        rule {
            limit {
                // Excludes (engine, workflowchat, storage, WorkflowChatService, etc.) keep parity code paths testable
                // without forcing full cloud/LLM integration coverage; floor tracks measured bundle ratio.
                minimum = 0.66
            }
        }
    }
    classDirectories.setFrom(files(classDirectories.files.collect {
        fileTree(dir: it, exclude: [
            '**/dto/**',
            '**/entity/**',
            '**/config/**',
            '**/WorkflowBuilderApplication.class',
            '**/engine/**',
            '**/workflowchat/**',
            '**/storage/**',
            '**/WorkflowChatService.class',
            '**/CloudStorageExplorerService.class'
        ])
    }))
}
