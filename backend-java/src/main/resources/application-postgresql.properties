# PostgreSQL profile: run with spring.profiles.active=postgresql (and set credentials).
# Example: SPRING_PROFILES_ACTIVE=postgresql POSTGRES_URL=jdbc:postgresql://localhost:5432/workflow ...
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/workflow}
spring.datasource.username=${POSTGRES_USER:workflow}
spring.datasource.password=${POSTGRES_PASSWORD:workflow}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
