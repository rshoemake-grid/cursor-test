# Production configuration
# Activate with: spring.profiles.active=production

# S-M4: Health details only when authorized (avoids leaking internal state)
management.endpoint.health.show-details=when-authorized

# S-H2: Explicit CORS origins required in production (no wildcard)
# Set to your frontend origin(s), e.g. https://app.yourdomain.com
cors.allowed-origins=https://localhost:3000
cors.allowed-credentials=true

# JWT secret must be set via JWT_SECRET env var (S-C4)
# CORS origins should be overridden per deployment

# WebSocket: restrict origins in production (matches CORS)
websocket.allowed-origins=${cors.allowed-origins:https://localhost:3000}
