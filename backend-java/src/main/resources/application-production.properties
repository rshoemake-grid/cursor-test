# Production configuration
# Activate with: spring.profiles.active=production
#
# Container logging (Docker / K8s): logs go to stdout only. For Datadog and similar, add profile
# "json" so each line is a JSON object: spring.profiles.active=production,json
# (or SPRING_PROFILES_ACTIVE=production,json).

# S-M4: Health details only when authorized (avoids leaking internal state)
management.endpoint.health.show-details=when-authorized

# Less noisy than local dev; override with LOGGING_LEVEL_COM_WORKFLOW=DEBUG if needed
logging.level.com.workflow=INFO

# No ANSI escape codes in log lines (cleaner in Datadog / Cloud Logging plain-text mode)
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${PID:- } --- [%t] %-40.40logger{39} : %m%n%wEx

# S-H2: Explicit CORS origins required in production (no wildcard)
# Set to your frontend origin(s), e.g. https://app.yourdomain.com
cors.allowed-origins=https://localhost:3000
cors.allowed-credentials=true

# JWT secret must be set via JWT_SECRET env var (S-C4)
# CORS origins should be overridden per deployment

# WebSocket: restrict origins in production (matches CORS)
websocket.allowed-origins=${cors.allowed-origins:https://localhost:3000}
