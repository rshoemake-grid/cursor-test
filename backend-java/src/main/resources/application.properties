# Server Configuration
server.port=8000
server.address=0.0.0.0

# Response compression (GZip - Apigee-compatible)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# API Configuration
api.version=v1
api.base-path=/api

# Database Configuration (SQLite - matches Python backend)
# Relative sqlite paths are resolved to repo root (parent of backend-java/) or workflow.sqlite.base-directory — see SqlitePathEnvironmentPostProcessor.
workflow.sqlite.base-directory=${WORKFLOW_SQLITE_BASE_DIR:}
spring.datasource.url=jdbc:sqlite:./workflows.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
cors.allowed-origins=*
cors.allowed-credentials=true
cors.environment=development

# JWT Configuration (aligned with Python backend: backend/config.py, backend/auth/auth.py)
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
# Optional separate HMAC key for refresh JWTs (Python REFRESH_TOKEN_SECRET_KEY). Blank = use jwt.secret.
jwt.refresh-secret=${REFRESH_TOKEN_SECRET_KEY:}
# Access token lifetime in minutes — env ACCESS_TOKEN_EXPIRE_MINUTES (minimum 20, default 30).
jwt.access-expiration-minutes=${ACCESS_TOKEN_EXPIRE_MINUTES:30}
# Refresh token lifetime in days — matches Python REFRESH_TOKEN_EXPIRE_DAYS (default 30).
jwt.refresh-expiration-days=${REFRESH_TOKEN_EXPIRE_DAYS:30}

# Auth: remember-me token expiration (7 days in ms)
auth.remember-me-expiration-ms=604800000

# Password Reset Token
password-reset.token-expiration-hours=24
# S-C5: Return token in response only when true (dev/testing). Never use true in production.
password-reset.return-token-in-response=false

# Execution Configuration
execution.timeout-seconds=300
execution.max-concurrent=10
# Per-node wall timeout (Python NODE_EXECUTION_TIMEOUT_SEC). Env NODE_EXECUTION_TIMEOUT_SEC overrides when set.
workflow.node-execution-timeout-sec=900
# Periodic DB snapshot while RUNNING (Python EXECUTION_STATE_PERSIST_INTERVAL_SEC). 0 disables.
execution.state-persist-interval-sec=${EXECUTION_STATE_PERSIST_INTERVAL_SEC:10}

# WebSocket Configuration
websocket.ping-interval-seconds=20
websocket.timeout-seconds=60
# Development: allow all origins. Production: set websocket.allowed-origins in application-production.properties
websocket.allowed-origins=*

# Request Size Limit (10MB - matches Python backend)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Apigee API Management
apigee.max-request-size=10485760
apigee.api-title=Agentic Workflow Builder API
apigee.api-description=API for the Agentic Workflow Builder application
apigee.api-version=1.0.0
apigee.production-url=https://api.yourdomain.com/api
apigee.development-url=http://localhost:8000/api
apigee.docs-url=https://docs.yourdomain.com/api

# Logging (SLF4J + Logback). See logback-spring.xml: console-only by default — no log file
# (files under /app are invisible to Docker/K8s log drivers; use stdout for Datadog etc.).
logging.level.root=INFO
logging.level.com.workflow=DEBUG

# Actuator (for metrics endpoint)
management.endpoints.web.exposure.include=health,metrics,prometheus
# S-M4: In production, use management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-details=always

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# LLM Provider URLs (for connection test)
workflow.llm.provider.urls.openai=https://api.openai.com/v1
workflow.llm.provider.urls.anthropic=https://api.anthropic.com/v1
workflow.llm.provider.urls.gemini=https://generativelanguage.googleapis.com/v1beta

# Vertex AI / Gemini (LlmVertexGeminiSupport, AgentNodeExecutor). OS env and repo-root .env override these.
GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:syy-cx-shop-np-c5e4}
GCP_PROJECT=${GCP_PROJECT:syy-cx-shop-np-c5e4}

# Environment
# S-M5: Default is development. For production, explicitly set spring.profiles.active=production
# (e.g. via SPRING_PROFILES_ACTIVE env var or -Dspring.profiles.active=production)
spring.profiles.active=development

# Optional dev user bootstrap (matches Python DEV_BOOTSTRAP_* — only when not production).
# Values may come from OS env or from repo-root .env (loaded automatically when running from backend-java/).
dev.bootstrap.username=${DEV_BOOTSTRAP_USERNAME:}
dev.bootstrap.password=${DEV_BOOTSTRAP_PASSWORD:}
dev.bootstrap.email=${DEV_BOOTSTRAP_EMAIL:}

# Local filesystem sandbox for storage nodes / explorer (matches Python LOCAL_FILE_BASE_PATH)
workflow.local-file-base-path=${LOCAL_FILE_BASE_PATH:}

# Parallel workflow execution pool
execution.parallel-threads=8
